<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Bautagebuch</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; padding: 0; background:#f5f5f5; }
    header { padding: 10px 15px; background:#222; color:#fff; }
    main { padding: 10px; }
    .tabs { display:flex; border-bottom:1px solid #ccc; background:#fff; }
    .tab { flex:1; text-align:center; padding:8px; cursor:pointer; font-size:14px; }
    .tab.active { background:#222; color:#fff; }
    .view { display:none; margin-top:10px; }
    .view.active { display:block; }
    label { display:block; font-size:13px; margin-top:8px; }
    input, select, textarea, button {
      width:100%; box-sizing:border-box; padding:8px; margin-top:4px;
      font-size:14px;
    }
    button { background:#222; color:#fff; border:none; border-radius:4px; }
    button.secondary { background:#777; }
    .row { display:flex; gap:8px; }
    .row > div { flex:1; }
    .card { background:#fff; padding:10px; margin-bottom:8px; border-radius:4px;
            box-shadow:0 1px 2px rgba(0,0,0,0.05); }
    .small { font-size:12px; color:#555; }
    table { width:100%; border-collapse:collapse; font-size:12px; margin-top:6px; }
    th, td { border:1px solid #ddd; padding:4px; text-align:left; }
    th { background:#eee; }
    .chip { display:inline-block; background:#eee; padding:2px 6px; border-radius:10px; font-size:11px; margin-right:4px; }
    img.thumb { width:60px; height:60px; object-fit:cover; border-radius:4px; margin-right:4px; }
  </style>
</head>
<body>
<header>
  <div>Bautagebuch (Lokal)</div>
</header>

<div class="tabs">
  <div class="tab active" data-view="tag">Tag</div>
  <div class="tab" data-view="woche">Woche</div>
  <div class="tab" data-view="monat">Monat</div>
  <div class="tab" data-view="projekte">Projekte</div>
</div>

<main>
  <!-- Tag -->
  <section id="view-tag" class="view active">
    <div class="card">
      <label>Datum
        <input type="date" id="tag-datum">
      </label>
      <div class="row">
        <div>
          <label>Projekt
            <select id="tag-projekt"></select>
          </label>
        </div>
        <div>
          <label>Ort
            <input type="text" id="tag-ort">
          </label>
        </div>
      </div>
      <div class="row">
        <div>
          <label>Beginn
            <select id="tag-start"></select>
          </label>
        </div>
        <div>
          <label>Ende
            <select id="tag-ende"></select>
          </label>
        </div>
      </div>
      <label>Tätigkeit
        <textarea id="tag-taetigkeit" rows="3" placeholder="Was wurde gemacht?"></textarea>
      </label>
      <label>Fotos
        <input type="file" id="tag-fotos" accept="image/*" capture="environment" multiple>
      </label>
      <div id="tag-foto-preview"></div>
      <button id="tag-speichern">Tag speichern</button>
      <div class="small" id="tag-info"></div>
    </div>
  </section>

  <!-- Woche -->
  <section id="view-woche" class="view">
    <div class="card">
      <label>Datum innerhalb der Woche wählen
        <input type="date" id="woche-datum">
      </label>
      <div id="woche-summary" class="small" style="margin-top:6px;"></div>
      <table id="woche-table">
        <thead>
          <tr>
            <th>Tag</th><th>Datum</th><th>Start-Ende</th><th>Stunden</th><th>Projekt(e)</th><th>Ort(e)</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </section>

  <!-- Monat -->
  <section id="view-monat" class="view">
    <div class="card">
      <div class="row">
        <div>
          <label>Monat
            <select id="monat-monat">
              <option value="0">Jan</option>
              <option value="1">Feb</option>
              <option value="2">Mrz</option>
              <option value="3">Apr</option>
              <option value="4">Mai</option>
              <option value="5">Jun</option>
              <option value="6">Jul</option>
              <option value="7">Aug</option>
              <option value="8">Sep</option>
              <option value="9">Okt</option>
              <option value="10">Nov</option>
              <option value="11">Dez</option>
            </select>
          </label>
        </div>
        <div>
          <label>Jahr
            <input type="number" id="monat-jahr" min="2020" max="2100">
          </label>
        </div>
      </div>
      <div id="monat-summary" class="small" style="margin-top:6px;"></div>
      <table id="monat-table">
        <thead>
          <tr>
            <th>Datum</th><th>Wochentag</th><th>Stunden</th><th>Projekt(e)</th><th>Ort(e)</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </section>

  <!-- Projekte -->
  <section id="view-projekte" class="view">
    <div class="card">
      <button id="projekt-neu">Neues Projekt</button>
    </div>
    <div id="projekt-liste"></div>
  </section>
</main>

<script>
  // --- IndexedDB Setup ---
  let db;
  const DB_NAME = 'bautagebuch-db';
  const DB_VERSION = 1;

  function openDb() {
    return new Promise((resolve, reject) => {
      const req = indexedDB.open(DB_NAME, DB_VERSION);
      req.onupgradeneeded = (e) => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains('projekte')) {
          const store = db.createObjectStore('projekte', { keyPath: 'id', autoIncrement: true });
          store.createIndex('aktiv', 'aktiv', { unique: false });
        }
        if (!db.objectStoreNames.contains('eintraege')) {
          const store = db.createObjectStore('eintraege', { keyPath: 'id', autoIncrement: true });
          store.createIndex('datum', 'datum', { unique: false });
        }
      };
      req.onsuccess = (e) => { db = e.target.result; resolve(); };
      req.onerror = (e) => reject(e.target.error);
    });
  }

  function tx(storeName, mode='readonly') {
    return db.transaction(storeName, mode).objectStore(storeName);
  }

  function getAll(storeName) {
    return new Promise((resolve, reject) => {
      const store = tx(storeName);
      const req = store.getAll();
      req.onsuccess = () => resolve(req.result);
      req.onerror = (e) => reject(e.target.error);
    });
  }

  function addOrPut(storeName, value) {
    return new Promise((resolve, reject) => {
      const store = tx(storeName, 'readwrite');
      const req = store.put(value);
      req.onsuccess = () => resolve(req.result);
      req.onerror = (e) => reject(e.target.error);
    });
  }

  function deleteById(storeName, id) {
    return new Promise((resolve, reject) => {
      const store = tx(storeName, 'readwrite');
      const req = store.delete(id);
      req.onsuccess = () => resolve();
      req.onerror = (e) => reject(e.target.error);
    });
  }

  function getByIndex(storeName, indexName, value) {
    return new Promise((resolve, reject) => {
      const store = tx(storeName);
      const index = store.index(indexName);
      const req = index.getAll(value);
      req.onsuccess = () => resolve(req.result);
      req.onerror = (e) => reject(e.target.error);
    });
  }

  // --- Helpers ---
  function pad2(n) { return n.toString().padStart(2, '0'); }

  function buildTimeOptions() {
    const times = [];
    for (let h=0; h<24; h++) {
      for (let m=0; m<60; m+=15) {
        times.push(pad2(h)+':'+pad2(m));
      }
    }
    return times;
  }

  function diffHours(start, end) {
    const [sh, sm] = start.split(':').map(Number);
    const [eh, em] = end.split(':').map(Number);
    const s = sh*60 + sm;
    const e = eh*60 + em;
    if (e <= s) return 0;
    return (e - s)/60;
  }

  function getWeekRange(dateStr) {
    const d = new Date(dateStr);
    // Montag als Wochenstart
    const day = d.getDay() === 0 ? 7 : d.getDay();
    const monday = new Date(d);
    monday.setDate(d.getDate() - (day-1));
    const sunday = new Date(monday);
    sunday.setDate(monday.getDate() + 6);
    return { monday, sunday };
  }

  function isSameDay(a, b) {
    return a.getFullYear()===b.getFullYear() &&
           a.getMonth()===b.getMonth() &&
           a.getDate()===b.getDate();
  }

  function weekdayName(d) {
    return ['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'][d.getDay()];
  }

  function formatDate(d) {
    return pad2(d.getDate())+'.'+pad2(d.getMonth()+1)+'.'+d.getFullYear().toString().slice(-2);
  }

  // --- UI Init ---
  const timeOptions = buildTimeOptions();
  const selStart = document.getElementById('tag-start');
  const selEnd = document.getElementById('tag-ende');
  timeOptions.forEach(t => {
    const o1 = document.createElement('option');
    o1.value = t; o1.textContent = t;
    selStart.appendChild(o1);
    const o2 = document.createElement('option');
    o2.value = t; o2.textContent = t;
    selEnd.appendChild(o2);
  });

  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('view-'+tab.dataset.view).classList.add('active');
      if (tab.dataset.view === 'woche') refreshWoche();
      if (tab.dataset.view === 'monat') refreshMonat();
      if (tab.dataset.view === 'projekte') refreshProjekte();
    });
  });

  // --- Projekte ---
  const projektSelect = document.getElementById('tag-projekt');
  const projektListeDiv = document.getElementById('projekt-liste');

  async function refreshProjekte() {
    const projekte = await getAll('projekte');
    projektListeDiv.innerHTML = '';
    projektSelect.innerHTML = '';
    projekte.filter(p => p.aktiv !== false).forEach(p => {
      const opt = document.createElement('option');
      opt.value = p.id;
      opt.textContent = p.name;
      projektSelect.appendChild(opt);
    });
    projekte.forEach(p => {
      const div = document.createElement('div');
      div.className = 'card';
      div.innerHTML = `
        <div><strong>${p.name}</strong></div>
        <div class="small">${p.ort || ''}</div>
        <div class="small">Status: ${p.aktiv === false ? 'inaktiv' : 'aktiv'}</div>
        <div style="margin-top:6px;" class="row">
          <div><button data-id="${p.id}" class="projekt-edit">Bearbeiten</button></div>
          <div><button data-id="${p.id}" class="projekt-del secondary">Löschen/Inaktiv</button></div>
        </div>
      `;
      projektListeDiv.appendChild(div);
    });
    projektListeDiv.querySelectorAll('.projekt-edit').forEach(btn => {
      btn.onclick = async () => {
        const id = Number(btn.dataset.id);
        const projekte = await getAll('projekte');
        const p = projekte.find(x => x.id === id);
        if (!p) return;
        const name = prompt('Projektname:', p.name);
        if (!name) return;
        const ort = prompt('Ort:', p.ort || '');
        const aktiv = confirm('Projekt aktiv? OK = aktiv, Abbrechen = inaktiv');
        p.name = name; p.ort = ort; p.aktiv = aktiv;
        await addOrPut('projekte', p);
        refreshProjekte();
      };
    });
    projektListeDiv.querySelectorAll('.projekt-del').forEach(btn => {
      btn.onclick = async () => {
        const id = Number(btn.dataset.id);
        const projekte = await getAll('projekte');
        const p = projekte.find(x => x.id === id);
        if (!p) return;
        const choice = confirm('OK = Projekt inaktiv setzen, Abbrechen = komplett löschen (vorsicht, Einträge bleiben ohne Bezug).');
        if (choice) {
          p.aktiv = false;
          await addOrPut('projekte', p);
        } else {
          await deleteById('projekte', id);
        }
        refreshProjekte();
      };
    });
  }

  document.getElementById('projekt-neu').addEventListener('click', async () => {
    const name = prompt('Projektname:');
    if (!name) return;
    const ort = prompt('Ort:');
    await addOrPut('projekte', { name, ort, aktiv:true });
    refreshProjekte();
  });

  projektSelect.addEventListener('change', async () => {
    const id = Number(projektSelect.value);
    const projekte = await getAll('projekte');
    const p = projekte.find(x => x.id === id);
    if (p && p.ort) document.getElementById('tag-ort').value = p.ort;
  });

  // --- Tag speichern ---
  const tagDatum = document.getElementById('tag-datum');
  const tagOrt = document.getElementById('tag-ort');
  const tagTaet = document.getElementById('tag-taetigkeit');
  const tagFotos = document.getElementById('tag-fotos');
  const tagFotoPreview = document.getElementById('tag-foto-preview');
  const tagInfo = document.getElementById('tag-info');

  tagFotos.addEventListener('change', () => {
    tagFotoPreview.innerHTML = '';
    Array.from(tagFotos.files).forEach(file => {
      const img = document.createElement('img');
      img.className = 'thumb';
      const reader = new FileReader();
      reader.onload = (e) => img.src = e.target.result;
      reader.readAsDataURL(file);
      tagFotoPreview.appendChild(img);
    });
  });

  document.getElementById('tag-speichern').addEventListener('click', async () => {
    if (!tagDatum.value) { alert('Bitte Datum wählen'); return; }
    if (!projektSelect.value) { alert('Bitte Projekt wählen'); return; }
    const start = selStart.value;
    const ende = selEnd.value;
    const h = diffHours(start, ende);
    const fotos = [];
    for (const file of tagFotos.files) {
      const dataUrl = await new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = e => resolve(e.target.result);
        reader.onerror = e => reject(e);
        reader.readAsDataURL(file);
      });
      fotos.push(dataUrl);
    }
    const eintrag = {
      datum: tagDatum.value,
      projektId: Number(projektSelect.value),
      ort: tagOrt.value,
      start, ende,
      taetigkeit: tagTaet.value,
      stunden: h,
      fotos
    };
    await addOrPut('eintraege', eintrag);
    tagInfo.textContent = 'Gespeichert. Arbeitszeit: ' + h.toFixed(2) + ' h';
    tagFotos.value = '';
    tagFotoPreview.innerHTML = '';
  });

  // --- Woche ---
  const wocheDatum = document.getElementById('woche-datum');
  const wocheTableBody = document.querySelector('#woche-table tbody');
  const wocheSummary = document.getElementById('woche-summary');

  async function refreshWoche() {
    const basisDatum = wocheDatum.value || new Date().toISOString().slice(0,10);
    wocheDatum.value = basisDatum;
    const { monday, sunday } = getWeekRange(basisDatum);
    const eintraege = await getAll('eintraege');
    const projekte = await getAll('projekte');

    const rows = [];
    let sum = 0;
    for (let d = new Date(monday); d <= sunday; d.setDate(d.getDate()+1)) {
      const ds = d.toISOString().slice(0,10);
      const dayEntries = eintraege.filter(e => e.datum === ds);
      const stunden = dayEntries.reduce((acc,e) => acc + (e.stunden || 0), 0);
      sum += stunden;
      const projSet = new Set();
      const ortSet = new Set();
      dayEntries.forEach(e => {
        const p = projekte.find(x => x.id === e.projektId);
        if (p) projSet.add(p.name);
        if (e.ort) ortSet.add(e.ort);
      });
      const first = dayEntries[0];
      const startEnd = first ? (first.start + '–' + first.ende) : '';
      rows.push({
        tag: weekdayName(d),
        datum: formatDate(d),
        startEnd,
        stunden,
        projekte: Array.from(projSet).join(', '),
        orte: Array.from(ortSet).join(', ')
      });
    }
    wocheTableBody.innerHTML = '';
    rows.forEach(r => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${r.tag}</td>
        <td>${r.datum}</td>
        <td>${r.startEnd}</td>
        <td>${r.stunden.toFixed(2)}</td>
        <td>${r.projekte}</td>
        <td>${r.orte}</td>
      `;
      wocheTableBody.appendChild(tr);
    });
    wocheSummary.textContent = 'Gesamtstunden in dieser Woche: ' + sum.toFixed(2) + ' h';
  }

  wocheDatum.addEventListener('change', refreshWoche);

  // --- Monat ---
  const monatMonat = document.getElementById('monat-monat');
  const monatJahr = document.getElementById('monat-jahr');
  const monatTableBody = document.querySelector('#monat-table tbody');
  const monatSummary = document.getElementById('monat-summary');

  monatMonat.addEventListener('change', refreshMonat);
  monatJahr.addEventListener('change', refreshMonat);

  async function refreshMonat() {
    const m = Number(monatMonat.value);
    const y = Number(monatJahr.value);
    if (!y) return;
    const eintraege = await getAll('eintraege');
    const projekte = await getAll('projekte');

    const firstDay = new Date(y, m, 1);
    const nextMonth = new Date(y, m+1, 1);
    const rows = [];
    let sum = 0;
    for (let d = new Date(firstDay); d < nextMonth; d.setDate(d.getDate()+1)) {
      const ds = d.toISOString().slice(0,10);
      const dayEntries = eintraege.filter(e => e.datum === ds);
      const stunden = dayEntries.reduce((acc,e) => acc + (e.stunden || 0), 0);
      sum += stunden;
      const projSet = new Set();
      const ortSet = new Set();
      dayEntries.forEach(e => {
        const p = projekte.find(x => x.id === e.projektId);
        if (p) projSet.add(p.name);
        if (e.ort) ortSet.add(e.ort);
      });
      rows.push({
        datum: formatDate(d),
        tag: weekdayName(d),
        stunden,
        projekte: Array.from(projSet).join(', '),
        orte: Array.from(ortSet).join(', ')
      });
    }
    monatTableBody.innerHTML = '';
    rows.forEach(r => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${r.datum}</td>
        <td>${r.tag}</td>
        <td>${r.stunden.toFixed(2)}</td>
        <td>${r.projekte}</td>
        <td>${r.orte}</td>
      `;
      monatTableBody.appendChild(tr);
    });
    monatSummary.textContent = 'Gesamtstunden im Monat: ' + sum.toFixed(2) + ' h';
  }

  // --- Init on load ---
  (async function() {
    await openDb();
    // Wenn keine Projekte vorhanden, Dummy-Projekt anlegen
    const projekte = await getAll('projekte');
    if (projekte.length === 0) {
      await addOrPut('projekte', { name:'Projekt 1', ort:'Ort 1', aktiv:true });
    }
    refreshProjekte();
    // Default Datum heute
    const today = new Date().toISOString().slice(0,10);
    tagDatum.value = today;
    wocheDatum.value = today;
    const now = new Date();
    monatMonat.value = now.getMonth();
    monatJahr.value = now.getFullYear();
    refreshWoche();
    refreshMonat();
  })();
</script>
</body>
</html>
